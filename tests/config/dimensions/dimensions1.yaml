#
# Test universe version 1, includes instrument, detector and visit only.
#
version: 1
namespace: test
skypix:
  common: htm7
  htm:
    class: lsst.sphgeom.HtmPixelization
    max_level: 24

elements:
  instrument:
    keys:
      - name: name
        type: string
        length: 32
    metadata:
      - name: class_name
        type: string
        length: 64
    governor: true
    storage:
      cls: lsst.daf.butler.registry.dimensions.governor.BasicGovernorDimensionRecordStorage

  detector:
    keys:
      - name: id
        type: int
      - name: full_name
        type: string
        length: 32
    requires: [instrument]
    metadata:
      - name: name_in_raft
        type: string
        length: 32
      - name: raft
        type: string
        length: 32
      - name: purpose
        type: string
        length: 32
    storage:
      cls: lsst.daf.butler.registry.dimensions.caching.CachingDimensionRecordStorage
      nested:
        cls: lsst.daf.butler.registry.dimensions.table.TableDimensionRecordStorage

  visit:
    keys:
      - name: id
        type: int
      - name: name
        type: string
        length: 64
    requires: [instrument]
    metadata:
      - name: seq_num
        type: int
    storage:
      cls: lsst.daf.butler.registry.dimensions.table.TableDimensionRecordStorage
